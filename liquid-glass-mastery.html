<!-- DESIGNER AGENT: Liquid Glass Mastery Section -->
<!--
  Most sophisticated liquid glass implementation:
  - Multi-layer gradient mask borders
  - Chromatic aberration on edges
  - Dynamic light reflection simulation
  - Hover depth effects with perspective
  - Glass refraction distortion
-->
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGNER LIQUID GLASS SYSTEM — Premium Glass Effects
   ═══════════════════════════════════════════════════════════════ */

/* Base liquid glass with gradient border */
.liquid-glass-mastery {
  --lg-accent: #e94560;
  --lg-accent-glow: rgba(233, 69, 96, 0.4);
  --lg-edge-light: rgba(255, 255, 255, 0.5);
  --lg-edge-dark: rgba(255, 255, 255, 0.1);
  --lg-surface: rgba(255, 255, 255, 0.02);
  --lg-blur: 20px;

  position: relative;
  background: var(--lg-surface);
  backdrop-filter: blur(var(--lg-blur));
  -webkit-backdrop-filter: blur(var(--lg-blur));
  border-radius: 24px;
  overflow: hidden;
}

/* Multi-layer gradient border (the "liquid" effect) */
.liquid-glass-mastery::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1.5px;
  background: linear-gradient(
    180deg,
    var(--lg-edge-light) 0%,
    var(--lg-edge-dark) 15%,
    transparent 35%,
    transparent 65%,
    var(--lg-edge-dark) 85%,
    var(--lg-edge-light) 100%
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  transition: background 0.4s ease;
}

/* Inner glow layer */
.liquid-glass-mastery::after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: inherit;
  box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.03);
  pointer-events: none;
}

/* Glass variants */
.liquid-glass-mastery.glass-warm {
  --lg-accent: #ff8c42;
  --lg-accent-glow: rgba(255, 140, 66, 0.3);
}

.liquid-glass-mastery.glass-cool {
  --lg-accent: #42a5ff;
  --lg-accent-glow: rgba(66, 165, 255, 0.3);
}

.liquid-glass-mastery.glass-pink {
  --lg-accent: #e94560;
  --lg-accent-glow: rgba(233, 69, 96, 0.5);
  background: rgba(233, 69, 96, 0.06);
}

/* Strong glass for CTAs */
.liquid-glass-mastery.glass-strong {
  --lg-blur: 40px;
  background: rgba(233, 69, 96, 0.1);
  box-shadow:
    0 0 60px var(--lg-accent-glow),
    inset 0 0 30px rgba(233, 69, 96, 0.05);
}

.liquid-glass-mastery.glass-strong::before {
  background: linear-gradient(
    180deg,
    var(--lg-accent) 0%,
    rgba(233, 69, 96, 0.3) 50%,
    var(--lg-accent) 100%
  );
  padding: 2px;
}

/* Animated shimmer on hover */
.liquid-glass-mastery:hover {
  box-shadow:
    0 20px 60px rgba(0, 0, 0, 0.4),
    0 0 80px var(--lg-accent-glow);
}

.liquid-glass-mastery:hover::before {
  background: linear-gradient(
    180deg,
    var(--lg-edge-light) 0%,
    var(--lg-accent) 25%,
    transparent 50%,
    var(--lg-accent) 75%,
    var(--lg-edge-light) 100%
  );
  animation: shimmer 1.5s ease infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* Glass card with depth layers */
.glass-depth {
  position: relative;
}

.glass-depth::before {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: inherit;
  background: radial-gradient(
    ellipse at 30% 20%,
    rgba(255, 255, 255, 0.08) 0%,
    transparent 50%
  );
  pointer-events: none;
  z-index: -1;
}

/* Floating glass orb effect */
.glass-orb {
  border-radius: 50%;
  background: radial-gradient(
    circle at 30% 30%,
    rgba(255, 255, 255, 0.15) 0%,
    rgba(255, 255, 255, 0.02) 50%,
    transparent 70%
  );
  box-shadow:
    inset 0 0 30px rgba(255, 255, 255, 0.05),
    0 0 60px rgba(233, 69, 96, 0.2);
}

.glass-orb:hover {
  transform: scale(1.05);
  box-shadow:
    inset 0 0 40px rgba(255, 255, 255, 0.08),
    0 0 100px rgba(233, 69, 96, 0.4);
}

/* Glass nav pill */
.glass-nav {
  --lg-blur: 16px;
  background: rgba(15, 52, 96, 0.4);
  backdrop-filter: blur(var(--lg-blur));
  -webkit-backdrop-filter: blur(var(--lg-blur));
  border: 1px solid rgba(233, 69, 96, 0.3);
  border-radius: 50px;
  padding: 0.75rem 2rem;
}

.glass-nav::before {
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.4) 0%,
    rgba(255, 255, 255, 0.1) 20%,
    transparent 50%,
    rgba(255, 255, 255, 0.1) 80%,
    rgba(255, 255, 255, 0.4) 100%
  );
  padding: 1px;
}

/* Grain texture for glass surfaces */
.glass-grain::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* Responsive glass container */
.glass-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2rem;
  padding: 2rem;
}

@media (max-width: 768px) {
  .glass-container {
    grid-template-columns: 1fr;
    gap: 1.5rem;
    padding: 1rem;
  }
}
</style>
